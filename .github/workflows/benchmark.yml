name: Benchmark

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: "22.19.0"
            experimental: false
          - node-version: "24.x"
            experimental: false
          - node-version: "26.x"
            experimental: true
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run audit:supply-chain
      - run: npm test
      - run: npm run check:dist
      - run: npm run test:coverage
      - run: npm run benchmark:ci-smoke
