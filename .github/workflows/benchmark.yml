name: Benchmark

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  push:
    branches:
      - main
    paths:
      - "benchmarks/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run benchmark:ci-smoke
