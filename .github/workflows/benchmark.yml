name: Benchmark

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: "22.19.0"
            experimental: false
          - node-version: "24.x"
            experimental: false
          - node-version: "26.x"
            experimental: true
    steps:
      # actions/checkout@v6 pinned on 2026-06-23.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node@v6 pinned on 2026-06-23.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check:dist
      - run: npm run test:coverage
      - run: npm run benchmark:ci-smoke
