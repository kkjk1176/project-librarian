name: Benchmark

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  push:
    branches:
      - main
    paths:
      - "benchmarks/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4 pinned on 2026-06-19.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # actions/setup-node@v4 pinned on 2026-06-19.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.19.0"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run benchmark:ci-smoke
