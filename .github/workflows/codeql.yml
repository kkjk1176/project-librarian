name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "37 20 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # actions/checkout@v6 pinned on 2026-06-23.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # github/codeql-action/init@v4 pinned on 2026-06-23.
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          languages: javascript-typescript
      # github/codeql-action/analyze@v4 pinned on 2026-06-23.
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
