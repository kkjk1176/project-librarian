name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "37 20 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # actions/checkout@v6 pinned on 2026-06-23.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # github/codeql-action/init@v4 pinned on 2026-06-23.
      - uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: javascript-typescript
      # github/codeql-action/analyze@v4 pinned on 2026-06-23.
      - uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7
