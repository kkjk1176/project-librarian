name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "37 20 * * 1"

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7
        with:
          languages: javascript-typescript
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7
