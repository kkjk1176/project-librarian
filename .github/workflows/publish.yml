name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release verification without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run release:check
      - name: Dry-run package contents
        run: npm pack --dry-run --json

  reject-manual-non-release-ref:
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "manual publish is allowed only from release tags matching refs/tags/v*"
          exit 1

  publish:
    needs: verify
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run && startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Publish to npm through trusted publishing
        run: npm publish --access public --ignore-scripts
