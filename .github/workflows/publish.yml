name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release verification without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run release:check
      - name: Dry-run package contents
        run: npm pack --dry-run --json

  build-native-helper:
    name: Build native helper (${{ matrix.triple }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: darwin-arm64
            runner: macos-14
          - triple: darwin-x64
            runner: macos-15-intel
          - triple: linux-arm64
            runner: ubuntu-24.04-arm
          - triple: linux-x64
            runner: ubuntu-latest
          - triple: win32-x64
            runner: windows-latest
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          package-manager-cache: false
      - run: npm ci
      - name: Stage packaged helper
        run: npm run native:stage
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: native-helper-${{ matrix.triple }}
          path: dist/native/${{ matrix.triple }}/
          if-no-files-found: error
          retention-days: 1

  package-native-helper-matrix:
    needs:
      - verify
      - build-native-helper
    runs-on: ubuntu-latest
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: native-helper-darwin-arm64
          path: dist/native/darwin-arm64
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: native-helper-darwin-x64
          path: dist/native/darwin-x64
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: native-helper-linux-arm64
          path: dist/native/linux-arm64
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: native-helper-linux-x64
          path: dist/native/linux-x64
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: native-helper-win32-x64
          path: dist/native/win32-x64
      - name: Restore executable bits
        run: find dist/native -type f -name project-librarian-indexer -exec chmod 755 {} \;
      - run: npm run native:package-manifest
      - run: npm run release:check
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: native-helper-package-matrix
          path: dist/native/
          if-no-files-found: error
          retention-days: 1

  reject-manual-non-release-ref:
    if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run && !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "manual publish is allowed only from release tags matching refs/tags/v*"
          exit 1

  publish:
    needs: package-native-helper-matrix
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run && startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      # Full-SHA pinned for supply-chain integrity; Dependabot updates the ref.
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: native-helper-package-matrix
          path: dist/native
      - name: Restore executable bits
        run: find dist/native -type f -name project-librarian-indexer -exec chmod 755 {} \;
      - name: Verify packaged helper matrix
        run: node benchmarks/tools/native-indexer-package-audit.js --require-packaged-helper-matrix --require-packaged-helper-provenance
      - name: Publish to npm through trusted publishing
        run: npm publish --access public --ignore-scripts
