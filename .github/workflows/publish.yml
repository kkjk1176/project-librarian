name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release verification without publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v6 pinned on 2026-06-19.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      # actions/setup-node@v6 pinned on 2026-06-19.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm install --global npm@latest
      - run: npm run release:check
      - name: Dry-run package contents
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm pack --dry-run --json
      - name: Publish to npm through trusted publishing
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish --access public
